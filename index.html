// ── 1. LEARNING FINGERPRINT ───────────────────────────────
// Computes mastery % per subject from MCQ history + profile + study sessions

const MASTERY_SUBJECTS = [
  {key:'ops',  label:'Operations',  color:'#006cb7', courses:['Operations Research','POM','Optimization','Quality','Supply Chain']},
  {key:'fin',  label:'Finance',     color:'#1a7a4a', courses:['Financial Management','Financial Accounting','Management Accounting','WACC','NPV']},
  {key:'mkt',  label:'Marketing',   color:'#6c3fc5', courses:['Marketing Management','IMC','Product Management','Consumer']},
  {key:'strat',label:'Strategy',    color:'#c8952a', courses:['Strategic Management','Business Environment','Game Theory']},
  {key:'data', label:'Data & IS',   color:'#0050a0', courses:['Data Science','Business Statistics','BRM','EBA','AI','Operations Analytics']},
  {key:'hrm',  label:'HR & OB',     color:'#d45f00', courses:['HRM','Organisational Behaviour','MSID','PPM','Leadership']},
];

function computeMasteryScore(subjectKey) {
  const subj = MASTERY_SUBJECTS.find(s => s.key === subjectKey);
  if (!subj) return 50;

  const hist = JSON.parse(localStorage.getItem(MCQ_HIST_KEY) || '[]');
  const relevant = hist.filter(h => subj.courses.some(c => h.sub && h.sub.toLowerCase().includes(c.toLowerCase())));

  let score = 50; // base
  let dataPoints = 0;

  if (relevant.length) {
    const avgPct = relevant.reduce((a,h) => a + (h.pct||0), 0) / relevant.length;
    score = Math.round(avgPct);
    dataPoints = relevant.length;
  }

  // Adjust from profile skills
  if (typeof P !== 'undefined' && P.skills) {
    const skillEntries = Object.entries(P.skills);
    const matching = skillEntries.filter(([name]) =>
      subj.courses.some(c => name.toLowerCase().includes(c.toLowerCase().split(' ')[0]))
    );
    if (matching.length) {
      const profileAvg = matching.reduce((a,[,v]) => a+v, 0) / matching.length;
      score = dataPoints > 0
        ? Math.round(score * 0.6 + profileAvg * 0.4)  // blend MCQ + profile
        : Math.round(profileAvg);
    }
  }

  // Boost for study time (Pomodoro sessions on this topic)
  const pomData = JSON.parse(localStorage.getItem(POM_DATA_KEY) || '{"sessions":[]}');
  const pomBoost = pomData.sessions
    ? pomData.sessions.filter(s => subj.courses.some(c => (s.subject||'').toLowerCase().includes(c.toLowerCase().split(' ')[0]))).length * 2
    : 0;

  return Math.min(99, Math.max(5, score + pomBoost));
}

function buildMasteryData() {
  const hist = JSON.parse(localStorage.getItem(MCQ_HIST_KEY) || '[]');
  const totalDataPts = hist.length;
  const scores = {};
  MASTERY_SUBJECTS.forEach(s => { scores[s.key] = computeMasteryScore(s.key); });
  return { scores, totalDataPts };
}

function renderMasteryRings() {
  const container = document.getElementById('mastery-rings');
  const insightEl = document.getElementById('mastery-insight');
  const dataPtsEl = document.getElementById('mastery-data-pts');
  if (!container) return;

  const { scores, totalDataPts } = buildMasteryData();
  if (dataPtsEl) dataPtsEl.textContent = totalDataPts;

  const r = 22, circ = 2 * Math.PI * r;

  container.innerHTML = MASTERY_SUBJECTS.map(s => {
    const pct = scores[s.key];
    const offset = circ * (1 - pct / 100);
    const col = pct >= 75 ? '#1a7a4a' : pct >= 55 ? s.color : '#c0392b';
    return `<div class="mastery-ring" title="${s.label}: ${pct}% mastery">
      <svg width="54" height="54" viewBox="0 0 54 54">
        <circle cx="27" cy="27" r="${r}" fill="none" stroke="var(--bg3)" stroke-width="5"/>
        <circle cx="27" cy="27" r="${r}" fill="none" stroke="${col}" stroke-width="5"
          stroke-dasharray="${circ}" stroke-dashoffset="${offset}"
          stroke-linecap="round" transform="rotate(-90 27 27)" class="mastery-arc"/>
        <text x="27" y="31" text-anchor="middle" font-size="10" font-weight="700" fill="${col}">${pct}</text>
      </svg>
      <div class="mastery-label">${s.label}</div>
    </div>`;
  }).join('');

  // Generate insight
  const sorted = MASTERY_SUBJECTS.map(s => ({...s, score: scores[s.key]})).sort((a,b)=>a.score-b.score);
  const weakest = sorted[0], strongest = sorted[sorted.length-1];
  const examDays = typeof calcDaysToExam === 'function' ? calcDaysToExam() : null;
  const examNote = examDays && examDays <= 21 ? ` Exam in ${examDays} days.` : '';

  if (insightEl) insightEl.innerHTML = totalDataPts > 0
    ? `💡 Your weakest area is <strong>${weakest.label}</strong> (${weakest.score}%). Your strongest is <strong>${strongest.label}</strong> (${strongest.score}%).${examNote} Focus today: <strong>${weakest.courses[0]}</strong>.`
    : `💡 Complete MCQ quizzes to build your learning fingerprint. Currently using profile data only.`;
}

// ── 2. SOCRATIC TUTOR ─────────────────────────────────────
const SOCRATIC_SYS = `You are a Socratic tutor for IIT Roorkee eMBA students. Your ONLY method is the Socratic method.

STRICT RULES:
1. NEVER give the answer directly, no matter what the student asks
2. ALWAYS respond with a question that guides the student toward the answer
3. When a student is on the right track, acknowledge it briefly then ask a deeper question
4. When a student is wrong, ask a question that reveals the contradiction in their thinking
5. Break down complex problems into small digestible sub-questions
6. Reference specific frameworks from the course: LP formulation, WACC formula, Porter's 5 Forces, Nash equilibrium etc.
7. After 4-5 exchanges, offer a "hint" if student is stuck — but still as a question
8. Celebrate correct reasoning with one sentence then immediately deepen

DO NOT: explain, summarize, or give worked examples upfront.
DO: ask probing questions, use analogies, make them think.

This builds deep understanding that survives exams — not just memory of answers.`;

async function startSocratic() {
  const topic = document.getElementById('socratic-topic')?.value || 'Operations Research';
  const chatEl = document.getElementById('socratic-chat');
  if (!chatEl) return;

  // Clear and start fresh session with an opening question
  chatEl.innerHTML = '';

  const courseCtx = typeof getCourseContext === 'function' ? getCourseContext(topic) : '';
  const ld = document.getElementById('socratic-ld');
  if (ld) ld.classList.add('on');

  const openingPrompt = `You are starting a Socratic tutoring session on: "${topic}"
Course context: ${courseCtx.slice(0,600)}

Begin with ONE powerful opening question that:
- Reveals what the student already knows or thinks they know
- Is broad enough to work for any knowledge level
- Will naturally lead deeper
- Is short (1-2 sentences max)

Do not introduce yourself or explain what you're doing. Just ask the question.`;

  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:200,system:SOCRATIC_SYS,messages:[{role:'user',content:openingPrompt}]})
    });
    const d = await r.json();
    const question = d.content?.[0]?.text || 'What do you already know about this topic?';
    if (ld) ld.classList.remove('on');

    const msgDiv = document.createElement('div');
    msgDiv.className = 'msg msg-a';
    msgDiv.innerHTML = `<strong>🦉 Topic: ${topic.split('—')[0].trim()}</strong><br><br>${question}`;
    chatEl.appendChild(msgDiv);
    chatEl.scrollTop = chatEl.scrollHeight;

    document.getElementById('socratic-inp')?.focus();
  } catch(e) {
    if (ld) ld.classList.remove('on');
  }
}

  const inp = document.getElementById('socratic-inp');

  addMsg('socratic-chat', q, 'u');

  if (ld) ld.classList.remove('on');

    }
  }

  addMsgWithTrace('socratic-chat', reply, ['orch','iitr'], 0);
}

// Reads real study behaviour to give a truly personalised briefing

function buildSessionAwareBriefing() {
  const today = new Date();
  const dateStr = today.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'});
  const bd = document.getElementById('brief-date');
  if (bd) bd.textContent = dateStr;

  // --- Exam countdown with urgency ---
  const days = typeof calcDaysToExam === 'function' ? calcDaysToExam() : null;
  const examEl = document.getElementById('brief-exam');
  if (examEl) {
    if (days === null) examEl.textContent = '✅ All exams done. Term 5 starts 18 Jul.';
    else if (days === 0) examEl.innerHTML = '<strong>🔴 EXAM TODAY!</strong> Check Calendar for room/time.';
    else if (days <= 3) examEl.innerHTML = `<strong>🔴 ${days} days to exam!</strong> Stop new topics. Review summaries only.`;
    else if (days <= 7) examEl.innerHTML = `⚠️ ${days} days out. Do 10 MCQs on your weakest topic today before the 6pm class.`;
    else if (days <= 14) examEl.innerHTML = `📅 ${days} days to exam. Time to start daily practice — 1 subject per day.`;
    else examEl.textContent = `${days} days until next exam. Good time to go deep on elective choices.`;
  }

  // --- Today's class from EVENTS ---
  const todayKey = `${today.getFullYear()}-${today.getMonth()}-${today.getDate()}`;
  const todayEvent = typeof EVENTS !== 'undefined' ? EVENTS[todayKey] : null;
  const todayEl = document.getElementById('brief-today');
  if (todayEl) {
    if (todayEvent && todayEvent[0] === 'cl') {
      todayEl.innerHTML = `📡 <strong>Live class today!</strong> ${todayEvent[1].replace('CLASS ','').replace(/W\d+ · /,'')}`;
    } else if (todayEvent && todayEvent[0] === 'ex') {
      todayEl.innerHTML = `⚡ <strong>EXAM:</strong> ${todayEvent[1]}`;
    } else {
      todayEl.textContent = 'No live session today — good day for self-study or Socratic tutor practice.';
    }
  }

  // --- Focus from mastery fingerprint (behaviour-derived, not manual) ---
  const { scores } = buildMasteryData();
  const sorted = MASTERY_SUBJECTS.map(s => ({...s, score: scores[s.key]})).sort((a,b)=>a.score-b.score);
  const weakest = sorted[0];
  const focusEl = document.getElementById('brief-focus');
  const hist = JSON.parse(localStorage.getItem(MCQ_HIST_KEY) || '[]');
  const recentTopics = hist.slice(0,3).map(h=>h.sub).filter(Boolean);
  if (focusEl) {
    const pomData = JSON.parse(localStorage.getItem(POM_DATA_KEY) || '{"sessions":[]}');
    const todaySessions = (pomData.sessions||[]).filter(s => s.date === today.toDateString());
    const studyMins = todaySessions.reduce((a,s)=>a+s.mins,0);
    if (studyMins > 0) {
      focusEl.innerHTML = `⏱ You've studied <strong>${studyMins} mins</strong> today. Weakest area: <strong>${weakest.label}</strong> (${weakest.score}%). Next: try Socratic Tutor on ${weakest.courses[0]}.`;
    } else if (recentTopics.length) {
      focusEl.innerHTML = `Last practiced: <strong>${recentTopics[0]}</strong>. Your <strong>${weakest.label}</strong> score (${weakest.score}%) needs attention. Click Exam Prep → MCQ Quiz.`;
    } else {
      focusEl.innerHTML = `Detected weakest area: <strong>${weakest.label}</strong>. Complete a quiz to build your learning fingerprint.`;
    }
  }

  // --- Placement from tracker ---
  const plEl = document.getElementById('brief-placement');
  if (plEl) {
    const active = placements.filter(p=>!['offer','rejected'].includes(p.status));
    const offers = placements.filter(p=>p.status==='offer');
    const interviews = placements.filter(p=>p.status==='interview');
    if (offers.length) plEl.innerHTML = `🎉 <strong>${offers.length} offer(s) received!</strong> ${active.length} still active.`;
    else if (interviews.length) plEl.innerHTML = `🗓 <strong>Interview at ${interviews[0].co}</strong> coming up. Prep in Exam Prep → Interview Practice.`;
    else if (active.length) plEl.innerHTML = `${active.length} placement target(s) tracked. No offers yet — keep following up.`;
    else plEl.textContent = 'No placement targets yet. Add companies in Exam Prep → Placement Tracker.';
  }
}

// ── M3. VOICE INPUT ───────────────────────────────────────
let voiceRecognition = null;
let voiceTarget = null;

function initVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const r = new SR();
  r.continuous = false;
  r.interimResults = false;
  r.lang = 'en-IN';
  r.onresult = e => {
    const txt = e.results[0][0].transcript;
    if (voiceTarget) {
      const el = document.getElementById(voiceTarget);
      if (el) { el.value = txt; el.focus(); }
    }
    document.querySelectorAll('.voice-btn').forEach(b => b.classList.remove('voice-active'));
  };
  r.onerror = () => {
    document.querySelectorAll('.voice-btn').forEach(b => b.classList.remove('voice-active'));
  };
  return r;
}

function toggleVoice(inputId, btn) {
  if (!voiceRecognition) voiceRecognition = initVoice();
  if (!voiceRecognition) { alert('Voice input not supported in this browser. Try Chrome.'); return; }
  voiceTarget = inputId;
  document.querySelectorAll('.voice-btn').forEach(b => b.classList.remove('voice-active'));
  btn.classList.add('voice-active');
  voiceRecognition.start();
}

// Auto-add voice buttons to all chat inputs on load
function addVoiceButtons() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  const chatInputs = ['chat-inp','db-inp','search-inp','socratic-inp','prob-inp','iq-chat-inp','coursera-inp'];
  chatInputs.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    const row = el.closest('.chat-row');
    if (!row || row.querySelector('.voice-btn')) return;
    const btn = document.createElement('button');
    btn.className = 'btn btn-o btn-sm voice-btn';
    btn.title = 'Voice input (en-IN)';
    btn.innerHTML = '🎙';
    btn.onclick = () => toggleVoice(id, btn);
    row.insertBefore(btn, el.nextSibling);
  });
}

// ── M4. WEEKLY STUDY DIGEST ───────────────────────────────
function buildWeeklyDigest() {
  const hist = JSON.parse(localStorage.getItem(MCQ_HIST_KEY) || '[]');
  const pom  = JSON.parse(localStorage.getItem(POM_DATA_KEY) || '{"sessions":[]}');
  const { scores } = typeof buildMasteryData === 'function' ? buildMasteryData() : { scores: {} };

  const now  = new Date();
  const weekAgo = new Date(now - 7*24*3600*1000);
  const weekQuizzes = hist.filter(h => new Date(h.date) >= weekAgo);
  const weekPom = (pom.sessions || []).filter(s => new Date(s.date) >= weekAgo);
  const totalMins = weekPom.reduce((a,s) => a+(s.mins||0), 0);
  const avgScore  = weekQuizzes.length ? Math.round(weekQuizzes.reduce((a,h)=>a+(h.pct||0),0)/weekQuizzes.length) : null;
  const weakSubj  = typeof MASTERY_SUBJECTS !== 'undefined'
    ? MASTERY_SUBJECTS.map(s=>({...s,score:scores[s.key]||50})).sort((a,b)=>a.score-b.score)[0]?.label
    : 'Finance';

  const nextExam  = typeof calcDaysToExam === 'function' ? calcDaysToExam() : null;
  const days = document.getElementById('brief-exam')?.textContent || '';

  return {
    weekMins:    totalMins,
    weekQuizzes: weekQuizzes.length,
    avgScore:    avgScore,
    weakSubj:    weakSubj,
    nextExamDays:nextExam,
    topSubjects: weekQuizzes.slice(0,3).map(h=>h.sub).filter(Boolean),
    activeApps:  placements.filter(p=>!['offer','rejected'].includes(p.status)).length,
  };
}

// Schedule Sunday reminder notification
function scheduleWeeklyDigestReminder() {
  if (!('Notification' in window)) return;
  Notification.requestPermission().then(p => {
    if (p !== 'granted') return;
    const now = new Date();
    const daysTillSunday = (7 - now.getDay()) % 7 || 7;
    const nextSunday = new Date(now);
    nextSunday.setDate(now.getDate() + daysTillSunday);
    nextSunday.setHours(20, 0, 0, 0); // 8pm Sunday
    const ms = nextSunday - now;
    if (ms > 0 && ms < 7*24*3600*1000) {
      setTimeout(() => {
        new Notification('Avinya Weekly Digest 📊', {
          body: 'Your weekly study report is ready. Open Avinya → Journey to read it.',
          icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🎓</text></svg>'
        });
      }, ms);
    }
  });
}

function registerServiceWorker() {
  if (!('serviceWorker' in navigator)) return;
  const swCode = `
const CACHE = 'avinya-v1';
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(['/'])));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  if (e.request.url.includes('api.anthropic.com')) return;
  e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).catch(() => caches.match('/'))));
});`;
  const blob = new Blob([swCode], {type:'application/javascript'});
  const url = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(() => {});
}

// ── M10. LONG-TERM MEMORY (localStorage log + smart recall) ──
const MEMORY_KEY = 'avinya_memory_log';
const MAX_MEMORY_ENTRIES = 100;

function logMemory(type, content, metadata) {
  const mem = JSON.parse(localStorage.getItem(MEMORY_KEY) || '[]');
  mem.unshift({
    type,          // 'quiz', 'note', 'chat', 'session', 'problem'
    content: content.slice(0, 300),
    metadata: metadata || {},
    date: new Date().toISOString(),
    dateStr: new Date().toLocaleDateString()
  });
  if (mem.length > MAX_MEMORY_ENTRIES) mem.length = MAX_MEMORY_ENTRIES;
  localStorage.setItem(MEMORY_KEY, JSON.stringify(mem));
}

function getMemoryContext(query) {
  const mem = JSON.parse(localStorage.getItem(MEMORY_KEY) || '[]');
  if (!mem.length) return '';
  const q = query.toLowerCase();
  const relevant = mem
    .filter(m => !q || m.content.toLowerCase().includes(q.split(' ')[0]) || m.type === 'quiz')
    .slice(0, 5);
  if (!relevant.length) return '';
  return '\n\nSTUDENT MEMORY LOG (recent activity):\n' +
    relevant.map(m => `[${m.dateStr}] ${m.type}: ${m.content.slice(0,150)}`).join('\n');
}

function renderMemoryTimeline(containerId) {
  const el = document.getElementById(containerId);
  if (!el) return;
  const mem = JSON.parse(localStorage.getItem(MEMORY_KEY) || '[]');
  if (!mem.length) {
    el.innerHTML = '<div style="color:var(--ink3);font-size:12px;padding:12px">No activity recorded yet. Complete quizzes, take notes, and chat with AI to build your memory log.</div>';
    return;
  }
  const typeIcon = {quiz:'🎯',note:'📝',chat:'💬',session:'⏱',problem:'🔢'};
  el.innerHTML = mem.slice(0,20).map(m => `
    <div style="display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:16px">${typeIcon[m.type]||'📌'}</span>

      </div>
    </div>`).join('');
}

// ── M11. PERFORMANCE ANALYTICS CHART ─────────────────────
function renderPerformanceChart(canvasId) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const hist = JSON.parse(localStorage.getItem(MCQ_HIST_KEY) || '[]').slice(0,14).reverse();
  if (hist.length < 2) {
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--ink3') || '#888';
    ctx.font = '13px DM Sans, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Complete 2+ quizzes to see your trend', canvas.width/2, canvas.height/2);
    return;
  }

  const W = canvas.width, H = canvas.height;
  const pad = { top:20, right:16, bottom:32, left:36 };
  const chartW = W - pad.left - pad.right;
  const chartH = H - pad.top - pad.bottom;
  const isDark = document.body.classList.contains('dark');
  const textCol = isDark ? '#a0a8b8' : '#5a6480';
  const lineCol = '#006cb7';
  const gridCol = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';

  ctx.clearRect(0, 0, W, H);

  // Grid lines at 0, 25, 50, 75, 100
  [0,25,50,75,100].forEach(val => {
    const y = pad.top + chartH - (val/100)*chartH;
    ctx.strokeStyle = gridCol; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left+chartW, y); ctx.stroke();
    ctx.fillStyle = textCol; ctx.font = '10px DM Sans'; ctx.textAlign = 'right';
    ctx.fillText(val+'%', pad.left-4, y+4);
  });

  // 70% pass line
  const passY = pad.top + chartH - 0.7*chartH;
  ctx.strokeStyle = '#1a7a4a33'; ctx.lineWidth = 1.5; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(pad.left, passY); ctx.lineTo(pad.left+chartW, passY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#1a7a4a'; ctx.font = '10px DM Sans'; ctx.textAlign = 'left';
  ctx.fillText('70%', pad.left+4, passY-3);

  // Data line with gradient fill
  const pts = hist.map((h,i) => ({
    x: pad.left + (i/(hist.length-1))*chartW,
    y: pad.top + chartH - ((h.pct||0)/100)*chartH
  }));

  // Gradient fill
  const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top+chartH);
  grad.addColorStop(0, 'rgba(0,108,183,0.25)');
  grad.addColorStop(1, 'rgba(0,108,183,0)');
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  pts.forEach(p => ctx.lineTo(p.x, p.y));
  ctx.lineTo(pts[pts.length-1].x, pad.top+chartH);
  ctx.lineTo(pts[0].x, pad.top+chartH);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.strokeStyle = lineCol; ctx.lineWidth = 2.5;
  ctx.beginPath();
  pts.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
  ctx.stroke();

  // Dots
  pts.forEach((p,i) => {
    const col = (hist[i].pct||0) >= 70 ? '#1a7a4a' : '#c0392b';
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
  });

  // X-axis labels
  hist.forEach((h,i) => {
    if (hist.length > 7 && i % 2 !== 0) return;
    const p = pts[i];
    ctx.fillStyle = textCol; ctx.font = '9px DM Sans'; ctx.textAlign = 'center';
    ctx.fillText((h.sub||'').split(' ')[0].slice(0,6), p.x, H - 6);
  });

  // Trend annotation
  if (hist.length >= 3) {
    const recent = hist.slice(-3).reduce((a,h)=>a+(h.pct||0),0)/3;
    const earlier = hist.slice(0,3).reduce((a,h)=>a+(h.pct||0),0)/3;
    const trend = recent > earlier ? '↑ Improving' : recent < earlier ? '↓ Declining' : '→ Steady';
    const trendCol = recent > earlier ? '#1a7a4a' : recent < earlier ? '#c0392b' : '#5a6480';
    ctx.fillStyle = trendCol; ctx.font = 'bold 11px DM Sans'; ctx.textAlign = 'right';
    ctx.fillText(trend, W - pad.right, pad.top + 12);
  }
}

// ═══════════════════════════════════════════════════════════
// SOURCE DATA MANAGER
// On first run: seeds window.storage with COURSE_KB, FACULTY,
//   EVENTS, FORMULA_DB (from the hardcoded defaults).
// On every run: loads from storage so data is editable/updatable
//   without touching code.
// Admin: call seedSourceData(true) to force re-seed from defaults.
// ═══════════════════════════════════════════════════════════

const SRC_VERSION = 'src_v1';

async function loadSourceData() {
  if (!window.storage) return; // use hardcoded globals as-is

  try {
    // Check if seeded already
    let seeded;
    try { seeded = await window.storage.get(SRC_VERSION + ':seeded'); } catch(e) {}

    if (!seeded || !seeded.value) {
      await seedSourceData(false);
    } else {
      // Load from storage into globals
      await _loadGlobalsFromStorage();
    }
  } catch(e) {
    console.warn('Source data load failed, using hardcoded defaults:', e);
  }
}

async function _loadGlobalsFromStorage() {
  try {
    const [kb, fac, form] = await Promise.all([
      window.storage.get(SRC_VERSION + ':course_kb').catch(() => null),
      window.storage.get(SRC_VERSION + ':faculty').catch(() => null),
      window.storage.get(SRC_VERSION + ':formula_db').catch(() => null),
    ]);

    if (kb && kb.value) {
      try { window.COURSE_KB = JSON.parse(kb.value); } catch(e) {}
    }
    if (fac && fac.value) {
      try { window.FACULTY = JSON.parse(fac.value); } catch(e) {}
    }
    if (form && form.value) {
      try { window.FORMULA_DB = JSON.parse(form.value); } catch(e) {}
    }
  } catch(e) {}
}

async function seedSourceData(force) {
  if (!window.storage) return;
  try {
    // Seed all static data into storage
    await Promise.all([
      window.storage.set(SRC_VERSION + ':course_kb',  JSON.stringify(COURSE_KB)),
      window.storage.set(SRC_VERSION + ':faculty',    JSON.stringify(FACULTY)),
      window.storage.set(SRC_VERSION + ':formula_db', JSON.stringify(FORMULA_DB)),
      window.storage.set(SRC_VERSION + ':seeded',     new Date().toISOString()),
    ]);
    if (force) showDbStatus('✅ Source data re-seeded from defaults', true);
    console.log('Avinya: source data seeded to storage');
  } catch(e) {
    console.warn('Seed failed:', e);
  }
}

// Update a single course professor in storage (future editability)
async function updateCourseProfessor(code, professor, profRole) {
  if (!window.COURSE_KB) return;
  const idx = COURSE_KB.findIndex(c => c.code === code);
  if (idx < 0) return;
  COURSE_KB[idx].professor = professor;
  if (profRole) COURSE_KB[idx].profRole = profRole;
  if (window.storage) {
    await window.storage.set(SRC_VERSION + ':course_kb', JSON.stringify(COURSE_KB));
    showDbStatus(`✅ Updated ${code} → ${professor}`, true);
  }
}

// Admin panel: show data source status
async function showDataSourceStatus() {
  if (!window.storage) {
    alert('Persistent storage not available in this environment.\nUsing hardcoded data and localStorage.');
    return;
  }
  let seeded, kb;
  try { seeded = await window.storage.get(SRC_VERSION + ':seeded'); } catch(e) {}
  try { kb = await window.storage.get(SRC_VERSION + ':course_kb'); } catch(e) {}
  const msg = [
    `☁️ Avinya Data Source Status`,
    ``,
    `Storage: ${window.storage ? '✅ Available' : '❌ Not available'}`,
    `Last seeded: ${seeded?.value ? new Date(seeded.value).toLocaleString() : 'Never'}`,
    `COURSE_KB in storage: ${kb?.value ? `✅ (${JSON.parse(kb.value).length} courses)` : '❌'}`,
    ``,
    `Source version: ${SRC_VERSION}`,
    `DB version: ${DB_VERSION}`,
  ].join('\n');
  alert(msg);
}
