<!-- STUDENT PROFILE PANEL -->
<div class="profile-overlay" id="profile-overlay" onclick="if(event.target===this)closeProfile()">
  <div class="profile-panel">
    <div class="pp-hdr">
      <div style="display:flex;align-items:center;gap:12px">
        <div class="av-lg" id="pp-avatar" style="background:#0d1b3e" onclick="cycleAvColor()">
          <span id="pp-initials">?</span>
          <div class="av-edit">✎</div>
        </div>
        <div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--ink)" id="pp-display-name">My Profile</div>
          <div style="font-size:11px;color:var(--ink3);margin-top:1px">IIT Roorkee eMBA · DoMS</div>
        </div>
      </div>
      <button onclick="closeProfile()" style="background:none;border:none;cursor:pointer;font-size:18px;color:var(--ink3);line-height:1">✕</button>
    </div>
    <div class="pp-body">
      <div class="pf-sec">
        <span class="pf-lbl">Personal Information</span>
        <div class="pf-row">
          <div><div style="font-size:10px;color:var(--ink3);margin-bottom:3px">Full Name</div><input class="pf-inp" id="pf-name" placeholder="Your full name" oninput="liveUpdateName()"></div>
          <div><div style="font-size:10px;color:var(--ink3);margin-bottom:3px">Roll / Enroll No.</div><input class="pf-inp" id="pf-roll" placeholder="e.g. 24MBA0001"></div>
        </div>
        <div class="pf-row">
          <div><div style="font-size:10px;color:var(--ink3);margin-bottom:3px">Email</div><input class="pf-inp" id="pf-email" type="email" placeholder="your@email.com"></div>
          <div><div style="font-size:10px;color:var(--ink3);margin-bottom:3px">Phone</div><input class="pf-inp" id="pf-phone" placeholder="+91 98765 43210"></div>
        </div>
      </div>
      <div class="pf-sec">
        <span class="pf-lbl">Academic Details</span>
        <div class="pf-row">
          <div><div style="font-size:10px;color:var(--ink3);margin-bottom:3px">Current Term</div>
            <select class="pf-inp" id="pf-term">
              <option>Term 1</option><option>Term 2</option><option>Term 3</option>
              <option>Term 4</option><option>Term 5</option><option>Term 6</option>
              <option>Term 7</option><option>Term 8</option>
            </select></div>
          <div><div style="font-size:10px;color:var(--ink3);margin-bottom:3px">CGPA This Term</div><input class="pf-inp" id="pf-cgpa" type="number" min="0" max="10" step="0.1" placeholder="e.g. 8.4"></div>
        </div>
        <div class="pf-row">
          <div><div style="font-size:10px;color:var(--ink3);margin-bottom:3px">Credits Completed</div><input class="pf-inp" id="pf-credits" type="number" min="0" max="99" placeholder="e.g. 42"></div>
          <div><div style="font-size:10px;color:var(--ink3);margin-bottom:3px">Attendance %</div><input class="pf-inp" id="pf-attendance" type="number" min="0" max="100" placeholder="e.g. 91"></div>
        </div>
        <div style="font-size:10px;color:var(--ink3);margin-bottom:3px">Specialization (chosen / target)</div>
        <select class="pf-inp" id="pf-spec">
          <option value="">-- Not yet selected --</option>
          <option>Operations Management</option><option>Finance</option><option>Marketing</option>
          <option>Information Systems</option><option>Human Resources</option>
          <option>Double: Operations + Finance</option><option>Double: Finance + IS</option>
          <option>Double: Marketing + IS</option><option>Double: Operations + IS</option>
        </select>
      </div>
      <div class="pf-sec">
        <span class="pf-lbl">Work & Career</span>
        <div style="font-size:10px;color:var(--ink3);margin-bottom:3px">Work Experience</div>
        <input class="pf-inp" id="pf-work" placeholder="e.g. 7 years · IT / Product Management">
        <div style="font-size:10px;color:var(--ink3);margin-bottom:3px">Current / Last Organization</div>
        <input class="pf-inp" id="pf-org" placeholder="e.g. Infosys, TCS, HDFC Bank...">
        <div style="font-size:10px;color:var(--ink3);margin-bottom:3px">Career Goal</div>
        <input class="pf-inp" id="pf-goal" placeholder="e.g. CPO, Entrepreneur, CFO, CMO...">
        <div style="font-size:10px;color:var(--ink3);margin-bottom:3px">LinkedIn Profile URL</div>
        <input class="pf-inp" id="pf-linkedin" type="url" placeholder="https://linkedin.com/in/yourprofile">
      </div>
      <div class="pf-sec">
        <span class="pf-lbl">Areas of Interest (tap to select)</span>
        <div class="int-tags" id="int-tags">
          <span class="int-tag" onclick="toggleInt(this)">Data Science</span>
          <span class="int-tag" onclick="toggleInt(this)">Strategy</span>
          <span class="int-tag" onclick="toggleInt(this)">Finance</span>
          <span class="int-tag" onclick="toggleInt(this)">Marketing</span>
          <span class="int-tag" onclick="toggleInt(this)">Operations</span>
          <span class="int-tag" onclick="toggleInt(this)">HR & Leadership</span>
          <span class="int-tag" onclick="toggleInt(this)">Entrepreneurship</span>
          <span class="int-tag" onclick="toggleInt(this)">FinTech</span>
          <span class="int-tag" onclick="toggleInt(this)">Supply Chain</span>
          <span class="int-tag" onclick="toggleInt(this)">Sustainability</span>
          <span class="int-tag" onclick="toggleInt(this)">Digital Transformation</span>
          <span class="int-tag" onclick="toggleInt(this)">Analytics</span>
        </div>
      </div>
      <div class="pf-sec">
        <span class="pf-lbl">Skill Self-Assessment (drag sliders)</span>
        <div id="sk-sliders">
          <div class="sk-row"><span class="sk-name">Financial Analysis</span><input type="range" class="sk-slider" min="0" max="100" value="50" oninput="this.closest('.sk-row').querySelector('.sk-val').textContent=this.value+'%'"><span class="sk-val">50%</span></div>
          <div class="sk-row"><span class="sk-name">Strategic Management</span><input type="range" class="sk-slider" min="0" max="100" value="50" oninput="this.closest('.sk-row').querySelector('.sk-val').textContent=this.value+'%'"><span class="sk-val">50%</span></div>
          <div class="sk-row"><span class="sk-name">Org. Behaviour & HRM</span><input type="range" class="sk-slider" min="0" max="100" value="50" oninput="this.closest('.sk-row').querySelector('.sk-val').textContent=this.value+'%'"><span class="sk-val">50%</span></div>
          <div class="sk-row"><span class="sk-name">Marketing Analytics</span><input type="range" class="sk-slider" min="0" max="100" value="50" oninput="this.closest('.sk-row').querySelector('.sk-val').textContent=this.value+'%'"><span class="sk-val">50%</span></div>
          <div class="sk-row"><span class="sk-name">Operations Research</span><input type="range" class="sk-slider" min="0" max="100" value="50" oninput="this.closest('.sk-row').querySelector('.sk-val').textContent=this.value+'%'"><span class="sk-val">50%</span></div>
          <div class="sk-row"><span class="sk-name">Quantitative Methods</span><input type="range" class="sk-slider" min="0" max="100" value="50" oninput="this.closest('.sk-row').querySelector('.sk-val').textContent=this.value+'%'"><span class="sk-val">50%</span></div>
        </div>
      </div>
    </div>

    <!-- Cloud Storage Sync -->
    <div style="margin:10px 18px 0;padding:12px 14px;background:var(--bg3);border-radius:var(--r);border:1px solid var(--border)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <div style="font-size:12px;font-weight:600">☁️ Cloud Data Sync</div>
        <span id="db-sync-status" style="font-size:11px;color:var(--green)"></span>
      </div>
      <div style="font-size:11px;color:var(--ink3);margin-bottom:8px">Study data (quizzes, notes, goals, placements) is saved to persistent cloud storage — survives browser clears and works across devices.</div>
      <div style="display:flex;gap:7px;flex-wrap:wrap">
        <button class="btn btn-sm btn-o" onclick="exportAllData()">⬇ Backup</button>
        <label class="btn btn-sm btn-o" style="cursor:pointer">⬆ Restore<input type="file" accept=".json" style="display:none" onchange="importData(this.files[0])"></label>
        <button class="btn btn-sm btn-o" onclick="hydrateFromStorage().then(()=>location.reload())">🔄 Force Sync</button>
        <button class="btn btn-sm btn-o" onclick="showDataSourceStatus()">📊 Data Status</button>
        <button class="btn btn-sm btn-o" onclick="seedSourceData(true)">🔁 Re-seed</button>
      </div>
    </div>

    <div class="pp-ftr">
      <button class="btn btn-p" style="flex:1;justify-content:center" onclick="saveProfile()">💾 Save Profile</button>
      <button class="btn btn-o btn-sm" onclick="closeProfile()">Cancel</button>
    </div>
  </div>
</div>

        <button class="btn btn-ghost btn-sm" onclick="show('assist-new')">🔍 Live Search</button>

    <div class="card-sm" style="text-align:center"><div class="stat-val" id="stat-credits">—</div><div class="stat-lbl">Credits Earned</div></div>
    <div class="card-sm" style="text-align:center"><div class="stat-val" id="stat-exam" style="color:var(--red)">—</div><div class="stat-lbl">Days to Exam</div></div>
    <div class="card-sm" style="text-align:center"><div class="stat-val" id="stat-attend" style="color:var(--green)">—%</div><div class="stat-lbl">Attendance</div></div>
  </div>

  <div class="gcol">
    <div>
      <div class="section-label">AI Learning Profile · Skill Analysis</div>
      <div class="card" style="margin-bottom:14px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <div style="font-size:13px;font-weight:600">🧬 Learning Fingerprint</div>
          <button class="btn btn-sm btn-o" style="font-size:11px;padding:3px 8px" onclick="show('learn')">Full View →</button>
        </div>
        <div id="mastery-rings" style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:10px"></div>
        <div id="db-skills"><!-- rendered from profile --></div>
        <div style="margin-top:10px;padding:10px;background:#fff5e0;border-radius:var(--r);border-left:3px solid var(--gold);font-size:12px;color:var(--ink2);line-height:1.5">
          <span id="ai-insight">💡 Complete MCQ quizzes to grow your learning fingerprint. Set skill levels in <b>My Profile</b> for baseline.</span>
        </div>
        <div id="mastery-insight" style="margin-top:8px;padding:8px 12px;background:var(--bg3);border-radius:var(--r);font-size:12px;color:var(--ink2);line-height:1.5"></div>
      </div>


      <!-- ═══ Case Studies (moved from tab) ═══ -->
      <div style="font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px;margin-top:6px">📚 Case Studies · AI Generator</div>
      <div class="card">
<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px">
    <div>
      <h2 style="font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;letter-spacing:-.1px">AI Case Study Generator</div>
      <div style="font-size:12px;color:var(--ink3);margin-top:2px">Global cases · Harvard · MIT · Stanford · INSEAD · India · Coursera instructors · Personalized to your profile</div>
    </div>
    <div style="display:flex;gap:7px;flex-wrap:wrap">
      <button class="btn btn-p" onclick="genCase()">🤖 Generate Case</button>
      <button class="btn btn-o btn-sm" onclick="show('myjourney')">🎓 Coursera Search</button>
    </div>
  </div>
  <div class="gnd">🌍 Cases sourced from: <span style="color:var(--red);font-weight:600">Harvard HBS</span> · <span style="color:var(--cobalt);font-weight:600">MIT Sloan</span> · <span style="color:var(--green);font-weight:600">Stanford GSB</span> · <span style="color:var(--purple);font-weight:600">INSEAD</span> · <span style="color:var(--gold);font-weight:600">DoMS IITR</span> · Indian Industry · Coursera instructors</div>

  <div id="cases-grid" class="g3" style="margin-bottom:18px">
    <!-- Rendered by renderCaseCards() from your profile -->
  </div>

  <div class="card">
    <div style="font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;margin-bottom:4px;letter-spacing:-.1px">🤖 Generate Personalized Case Study — Claude AI</div>
    <div style="font-size:12px;color:var(--ink3);margin-bottom:14px">AI selects relevant frameworks from your DoMS curriculum and generates a complete case with discussion questions</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px">
      <div>
        <div style="font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px">Subject Area</div>
        <select id="case-sub" style="width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--r);font-size:12px;font-family:'DM Sans',sans-serif;background:var(--bg2);color:var(--ink)">
          <option value="Operations Research and Supply Chain Management">Operations Research &amp; SCM</option>

      </div>

        <select id="case-ind" style="width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--r);font-size:12px;font-family:'DM Sans',sans-serif;background:var(--bg2);color:var(--ink)">

            <option>Indian Manufacturing (Tata, Mahindra, L&amp;T)</option>
            <option>Indian Fintech / Banking (HDFC, Paytm, Razorpay)</option>
            <option>E-commerce &amp; Logistics (Flipkart, Meesho, Delhivery)</option>

            <option>Healthcare India (Apollo, Narayana, Manipal)</option>
            <option>IT / Consulting India (Infosys, Wipro, TCS)</option>
          </optgroup>
          <optgroup label="── Global ──">
            <option>Big Tech (Apple, Google, Amazon, Microsoft, Meta)</option>
            <option>Global FMCG (P&amp;G, Unilever, Nestle, Nike)</option>
            <option>Automotive EV (Tesla, Toyota, BYD, Ford EV)</option>
            <option>Global Finance (Goldman Sachs, JPMorgan, BlackRock)</option>
            <option>Healthcare Global (J&amp;J, Pfizer, UnitedHealth)</option>
            <option>Retail / D2C (Walmart, Zara, Warby Parker)</option>

      </div>
      <div>

        <select id="case-source" style="width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--r);font-size:12px;font-family:'DM Sans',sans-serif;background:var(--bg2);color:var(--ink)">

          <option value="insead">🟣 INSEAD Style</option>

        </select>

    <div id="case-out" style="display:none;margin-bottom:12px;padding:16px;background:var(--bg3);border-radius:var(--r);border-left:3px solid var(--blue)">
      <div style="font-size:13px;font-weight:700;color:var(--navy);margin-bottom:10px" id="case-title"></div>

// ═══════════════════════════════════════════════════════════
// PERSISTENT DB LAYER
// Primary:  window.storage (Anthropic Artifacts persistent KV)
// Fallback: localStorage (browser memory — may be cleared)
// All user data flows through db.get() / db.set()
// ═══════════════════════════════════════════════════════════

const DB_VERSION = 'av1';  // bump to force re-seed

const db = {
  // Read: try storage first, fall back to localStorage
  async get(key) {
    try {
      if (window.storage) {
        const r = await window.storage.get(DB_VERSION + ':' + key);
        if (r && r.value !== undefined) {
          const val = r.value;
          // Keep localStorage in sync for sync reads
          try { localStorage.setItem(key, val); } catch(e) {}
          return val;
        }
      }
    } catch(e) {}
    // Fallback to localStorage
    return localStorage.getItem(key);
  },

  // Write: write to both storage and localStorage
  async set(key, value) {
    try {
      if (window.storage) {
        await window.storage.set(DB_VERSION + ':' + key, value);
      }
    } catch(e) {}
    try { localStorage.setItem(key, value); } catch(e) {}
  },

  // Delete from both
  async del(key) {
    try {
      if (window.storage) await window.storage.delete(DB_VERSION + ':' + key);
    } catch(e) {}
    try { localStorage.removeItem(key); } catch(e) {}
  },

  // Sync version (localStorage only — for code that can't await)
  getSync(key) {
    return localStorage.getItem(key);
  },

  // Write sync (localStorage) + fire-and-forget to storage
  setSync(key, value) {
    try { localStorage.setItem(key, value); } catch(e) {}
    db.set(key, value).catch(() => {});  // async, don't block
  }
};

// ── Wrap all KEY-based accessors to use db ──────────────────
// On page load, hydrate localStorage from storage so sync reads work
async function hydrateFromStorage() {
  const keys = [
    POM_DATA_KEY, MCQ_HIST_KEY, PL_KEY, GOALS_KEY,
    WB_KEY, MEM_KEY, NOTES_KEY, MEMORY_KEY,
    'avinya_profile_v2', 'avinya_ratings', 'avinya_dark', 'avinya_key'
  ];
  if (!window.storage) return;
  const statusEl = document.getElementById('db-sync-status');
  if (statusEl) statusEl.textContent = '⏳ Syncing from cloud...';
  let synced = 0;
  for (const key of keys) {
    try {
      const r = await window.storage.get(DB_VERSION + ':' + key);
      if (r && r.value !== undefined) {
        localStorage.setItem(key, r.value);
        synced++;
      }
    } catch(e) {}
  }
  if (statusEl) statusEl.textContent = synced > 0
    ? `☁️ Synced ${synced} records from cloud`
    : '💾 Using local data (no cloud records yet)';
  setTimeout(() => { if (statusEl) statusEl.textContent = ''; }, 3000);
}

// ── Patch all KEY-based save functions to use db.setSync ───
// This intercepts every localStorage.setItem call made via KEY constants

function _dbPatch() {
  // Patch JSON save helpers
  const _origSetItem = localStorage.setItem.bind(localStorage);
  const WATCHED = new Set([
    POM_DATA_KEY, MCQ_HIST_KEY, PL_KEY, GOALS_KEY,
    WB_KEY, MEM_KEY, NOTES_KEY, MEMORY_KEY,
    'avinya_profile_v2', 'avinya_ratings', 'avinya_dark'
  ]);
  localStorage.setItem = function(key, value) {
    _origSetItem(key, value);
    if (WATCHED.has(key) && window.storage) {
      window.storage.set(DB_VERSION + ':' + key, value).catch(() => {});
    }
  };
}

// ── Show sync indicator in UI ───────────────────────────────
function showDbStatus(msg, ok) {
  const el = document.getElementById('db-sync-status');
  if (el) {
    el.textContent = msg;
    el.style.color = ok ? 'var(--green)' : 'var(--gold)';
    setTimeout(() => { el.textContent = ''; }, 4000);
  }
}

// ── Export / backup all data ────────────────────────────────
async function exportAllData() {
  const keys = [
    POM_DATA_KEY, MCQ_HIST_KEY, PL_KEY, GOALS_KEY,
    WB_KEY, MEM_KEY, NOTES_KEY, MEMORY_KEY,
    'avinya_profile_v2', 'avinya_ratings'
  ];
  const backup = { exported: new Date().toISOString(), version: DB_VERSION, data: {} };
  for (const k of keys) {
    const v = localStorage.getItem(k);
    if (v) backup.data[k] = v;
  }
  const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `avinya-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  showDbStatus('✅ Backup downloaded', true);
}

// ── Import / restore from backup ────────────────────────────
function importData(file) {
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const backup = JSON.parse(e.target.result);
      if (!backup.data) throw new Error('Invalid backup file');
      let count = 0;
      for (const [k, v] of Object.entries(backup.data)) {
        await db.set(k, v);
        count++;
      }
      showDbStatus(`✅ Restored ${count} records`, true);
      setTimeout(() => location.reload(), 1500);
    } catch(err) {
      showDbStatus('❌ Import failed: ' + err.message, false);
    }
  };
  reader.readAsText(file);
}

// ── PATENT SEARCH ENGINE ─────────────────────────────────
// Uses USPTO PatentsView (free, no key) + Google Patents web_search
// Replaces Derwent/Clarivate which requires enterprise subscription

async function fetchPatents(query) {
  // Strategy 1: USPTO PatentsView API — completely free
  const usptoClauses = query.split(' ').slice(0,3).map(w => ({
    "_contains": { "patent_title": w }
  }));

  let usptoResults = [];
  try {
    const q = encodeURIComponent(JSON.stringify({
      "_or": usptoClauses
    }));
    const r = await fetch(
      `https://api.patentsview.org/patents/query?q={"_text_any":{"patent_abstract":"${query.replace(/"/g,'').slice(0,60)}"}}&f=["patent_number","patent_title","patent_date","patent_abstract","assignee_organization","inventor_last_name"]&o={"per_page":5}`,
      { headers: { 'Accept': 'application/json' } }
    );
    if (r.ok) {
      const data = await r.json();
      if (data.patents) {
        usptoResults = data.patents.map(p => ({
          source: 'USPTO PatentsView',
          title: p.patent_title,
          number: p.patent_number,
          date: p.patent_date,
          assignee: p.assignees?.[0]?.assignee_organization || 'Unknown',
          inventors: p.inventors?.map(i => i.inventor_last_name).join(', ') || '',
          abstract: p.patent_abstract?.slice(0, 200) + '...',
          url: `https://patents.google.com/patent/US${p.patent_number}`
        }));
      }
    }
  } catch(e) {
    console.warn('PatentsView fetch failed:', e.message);
  }

  return usptoResults;
}

// Current session trace log
let _traceLog = [];
let _traceStart = 0;

function agentSet(key, state) {
  const m = AGENT_META[key]; if(!m) return;
  const el = document.getElementById(m.id);
  if(el) el.className = 'ap ' + state;
}

function agentReset() {
  Object.keys(AGENT_META).forEach(k => agentSet(k, 'idle'));
  // Mark IITR always ready after init
  setTimeout(() => agentSet('iitr', 'ready'), 400);
}

function agentDone(key) { agentSet(key, 'done'); }

// Detect which agents a query needs based on keywords
function detectAgents(q) {
  const lower = q.toLowerCase();
  const agents = ['orch', 'iitr', 'web'];  // always active
  if (/career|job|salary|hire|linkedin|recrui|company|professional|role/i.test(q))  agents.push('li');
  if (/statistic|market|size|growth|percent|revenue|industry data|report/i.test(q)) agents.push('stat');
  if (/patent|innovat|r&d|technolog|invention|ip |intellectual/i.test(q))           agents.push('dw');
  if (/paper|research|journal|academic|scholar|citation|study|literature/i.test(q)) agents.push('gs');
  return [...new Set(agents)];
}

// Start a trace session — activates pills + logs start time
function traceStart(q) {
  _traceLog = [];
  _traceStart = Date.now();
  const agents = detectAgents(q);

  agents.forEach(k => agentSet(k, 'busy'));

  // Log each active agent
  agents.forEach(k => {
    const m = AGENT_META[k];
    const desc = {
      orch: 'Routing query, building context from student profile',
      iitr: 'Searching DoMS faculty, curriculum & calendar knowledge base',
      web:  'Live web search for current IITR news & data',
      li:   'Querying LinkedIn for career data & job market intelligence',
      stat: 'Fetching industry statistics & market benchmarks from Statista',
      dw:   'Searching Derwent for patent filings & innovation trends',
      gs:   'Searching Google Scholar for academic papers & citations',
    }[k] || 'Processing';
    _traceLog.push({ key: k, label: m.label, icon: m.icon, color: m.color, desc, start: Date.now() });
  });

  return agents;
}

// End trace — mark all done, return elapsed
function traceEnd(agents) {
  const elapsed = Date.now() - _traceStart;
  agents.forEach(k => agentDone(k));
  _traceLog.forEach(step => step.elapsed = Date.now() - step.start);
  // Reset pills after 3 seconds
  setTimeout(() => {
    agents.forEach(k => agentSet(k, 'idle'));
    agentSet('iitr', 'ready');
  }, 3000);
  return elapsed;
}

// Build the collapsible trace block HTML
let _traceCounter = 0;
function buildTrace(agents, elapsedMs, responseText) {
  const id = 'trace-' + (++_traceCounter);
  const agentCount = agents.length;
  const srcTags = buildSourceTags(responseText);

  const steps = _traceLog.map(step => `
    <div class="trace-step">
      <div class="trace-icon" style="background:${step.color}">${step.icon}</div>
      <div class="trace-info">
        <span style="font-weight:600">${step.label}</span>
        <span style="color:var(--ink3)"> — ${step.desc}</span>
      </div>
      <div class="trace-time">${step.elapsed ? (step.elapsed/1000).toFixed(1)+'s' : '—'}</div>
    </div>`).join('');

  return `<div class="trace-block">
    <div class="trace-hdr" onclick="toggleTrace('${id}')">
      <div class="trace-hdr-title">⚡ ${agentCount} agent${agentCount>1?'s':''} used</div>
      <div class="trace-hdr-meta">${agents.map(k=>AGENT_META[k]?.icon||'').join(' ')} · ${(elapsedMs/1000).toFixed(1)}s</div>
      <span class="trace-hdr-arrow" id="${id}-arrow">▸</span>
    </div>
    <div class="trace-body" id="${id}-body">
      ${steps}
    </div>
  </div>`;
}

function toggleTrace(id) {
  const body  = document.getElementById(id + '-body');
  const arrow = document.getElementById(id + '-arrow');
  if (!body) return;
  const open = body.classList.toggle('open');
  if (arrow) arrow.textContent = open ? '▾' : '▸';
  if (arrow) arrow.style.transform = open ? 'rotate(0deg)' : '';
}

    `<a href="${s.href}" target="_blank" class="src ${s.cls}">${s.icon} ${s.label}</a>`
  ).join('') + '</div>';
}

function addMsgWithTrace(chatId, text, agents, elapsedMs) {
  const el = document.getElementById(chatId);
  if (!el) return;

  traceDiv.innerHTML = buildTrace(agents, elapsedMs, text);

  // Clean text (strip any [SOURCE:] tags if present)
  const cleanText = text.replace(/\[SOURCE:[^\]]+\]/g, '').trim();

  const srcHtml = buildSourceTags(text);
  if (srcHtml) {

    srcEl.innerHTML = srcHtml;
    msgDiv.appendChild(srcEl.firstChild);
  }

  el.appendChild(msgDiv);
  el.scrollTop = el.scrollHeight;
}

// ═══════════════════ CLAUDE API ═══════════════════

// Extract full conversation history from a chat DOM element
function getChatHistory(chatId) {
  const el = document.getElementById(chatId);
  if (!el) return [];
  const msgs = [];
  el.querySelectorAll('.msg').forEach(m => {
    if (m.classList.contains('msg-u')) {
      msgs.push({ role: 'user', content: m.textContent.trim() });
    } else if (m.classList.contains('msg-a')) {
      // Get text content only (skip nested trace/source divs for cleanliness)
      const text = Array.from(m.childNodes)
        .filter(n => n.nodeType === Node.TEXT_NODE)
        .map(n => n.textContent).join('').trim()
        || m.textContent.trim();
      if (text && !text.startsWith('⚡')) {
        msgs.push({ role: 'assistant', content: text });
      }
    }
  });
  // Keep last 10 exchanges (20 messages) to stay within context limits
  return msgs.slice(-20);
}

async function callClaude(messages, sys='', webSearch=false){
  if(!KEY) return '⚠️ API key not set. Click "Set API Key" in the top bar to activate Claude AI.\n\nYou can get a free key from console.anthropic.com';
  const body={model:'claude-sonnet-4-6', max_tokens:3000, messages};
  if(sys) body.system=sys;
  if(webSearch) body.tools=[{type:'web_search_20250305',name:'web_search'}];
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify(body)
    });
    const d=await r.json();
    if(d.error) return `⚠️ API Error: ${d.error.message}`;
    return d.content.filter(c=>c.type==='text').map(c=>c.text).join('\n')||'No response generated.';
  }catch(e){return `⚠️ Connection error: ${e.message}. Please check your API key.`;}
}

async function chat(inId, chatId, ldId, sys){
  const inp = document.getElementById(inId);
  const v = inp.value.trim(); if(!v) return;

  // Add user message to DOM first
  addMsg(chatId, v, 'u');
  inp.value = '';

  const ld = document.getElementById(ldId);
  if(ld) ld.classList.add('on');

  // Build full conversation history from DOM (includes this new user msg)
  const history = getChatHistory(chatId);
  // history already contains the new user message we just added above

  const agents = traceStart(v);
  const r = await callClaude(history, sys, true);
  const elapsed = traceEnd(agents);
  if(ld) ld.classList.remove('on');

  if (/patent|innovat|r&d|filing|invention|ip /i.test(v)) {
    const chatEl = document.getElementById(chatId);
    if (chatEl) fetchPatents(v).then(patents => { if (patents.length>0) renderPatentCards(patents, chatEl); });
  }

  addMsgWithTrace(chatId, r, agents, elapsed);
  if (typeof saveToHistory === 'function') saveToHistory(v, r);
}

    else if(facFilter==='retired') fm=p.tag==='retired';
    else fm=p.area===facFilter && !p.tag; // active faculty only when filtering by area
    const sm=!q||p.name.toLowerCase().includes(q)||p.research.toLowerCase().includes(q)||p.role.toLowerCase().includes(q)||p.email.toLowerCase().includes(q);
    return fm&&sm;
  });
  if(!f.length){
    grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:24px;color:var(--ink3)">No faculty found. Try a different search or filter.</div>';
    return;
  }
  // Group by section
  const active=f.filter(p=>!p.tag);
  const practice=f.filter(p=>p.tag==='practice');
  const retired=f.filter(p=>p.tag==='retired');
  
  function renderCard(p){
    const note=p.note?`<div style="font-size:11px;color:var(--gold);margin-top:3px;font-style:italic">ℹ ${p.note}</div>`:'';
    const room=p.room&&p.room!=='—'?`<span>📍 ${p.room}</span> &nbsp;·&nbsp; `:'';
    return `<div class="fc">
      <div class="fc-av" style="background:${p.color}">${p.init}</div>
      <div style="flex:1;min-width:0">
        <div class="fc-name">${tagBadge(p)}${p.name}</div>
        <div class="fc-role">${p.role} &nbsp;<a href="${p.url}" target="_blank" style="font-size:10px;color:var(--cobalt);font-weight:400;text-decoration:none">View Profile ↗</a></div>
        <div class="fc-res">${p.research}</div>
        <div style="font-size:11px;color:var(--ink3);margin-top:4px">${room}✉ <a href="mailto:${p.email}" style="color:var(--cobalt)">${p.email}</a>${p.phone&&p.phone!=='—'?' &nbsp;·&nbsp; 📞 '+p.phone:''}</div>
        ${note}
        <div class="fc-btns">
          <button class="fb fb-wa" onclick="waMsg('${p.name.replace(/'/g,"\\'")}','${p.email}')">${WA_SVG} WhatsApp</button>
          <button class="fb fb-li" onclick="window.open('https://www.linkedin.com/search/results/all/?keywords='+encodeURIComponent('${p.name} IIT Roorkee DoMS'),'_blank')">${LI_SVG} LinkedIn</button>
          <button class="fb fb-em" onclick="emailFac('${p.name.replace(/'/g,"\\'")}','${p.email}','${p.research.split('·')[0].trim().replace(/'/g,"\\'")}')">✉ Email</button>
          <button class="fb" style="background:var(--bg3);color:var(--ink3);border:1px solid var(--border2)" onclick="qask('Tell me about ${p.name.replace(/'/g,"\\'")} at IIT Roorkee DoMS. Their research: ${p.research.substring(0,100).replace(/'/g,"\\'")}. How is this relevant for eMBA students?')">🤖 AI Info</button>
        </div>
      </div>
    </div>`;
  }

  let html='';
  if(active.length){
    if(facFilter==='all') html+=`<div style="grid-column:1/-1;font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:1.2px;padding:4px 0 6px;border-bottom:1px solid var(--border);margin-bottom:4px">Active Faculty (${active.length})</div>`;
    html+=active.map(renderCard).join('');
  }
  if(practice.length){
    html+=`<div style="grid-column:1/-1;font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:1.2px;padding:10px 0 6px;border-bottom:1px solid var(--border);margin-bottom:4px;margin-top:8px">Professors of Practice (${practice.length})</div>`;
    html+=practice.map(renderCard).join('');
  }
  if(retired.length){
    html+=`<div style="grid-column:1/-1;font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:1.2px;padding:10px 0 6px;border-bottom:1px solid var(--border);margin-bottom:4px;margin-top:8px">Retired Faculty (${retired.length})</div>`;
    html+=retired.map(renderCard).join('');
  }
  grid.innerHTML=html;
}

  if(ld) ld.classList.remove('on');

async function processFile(event){
  const file=event.target.files[0]; if(!file) return;
  document.getElementById('up-ld').classList.add('on');
  document.getElementById('up-out').style.display='none';
  const SYS_UP=`You are Avinya AI analyzing an uploaded academic document for an IIT Roorkee eMBA student. ${IITR_KNOWLEDGE} Identify: subject area (link to DoMS curriculum), solve problems shown, detect skill gaps, recommend specific faculty at DoMS IITR who can help.`;
  if(file.type.startsWith('image/')){
    const reader=new FileReader();
    reader.onload=async(e)=>{
      const b64=e.target.result.split(',')[1];
      if(!KEY){document.getElementById('up-ld').classList.remove('on');document.getElementById('up-content').textContent='⚠️ Set your API key to use AI upload analysis.';document.getElementById('up-out').style.display='block';return;}
      try{
        const r=await fetch('https://api.anthropic.com/v1/messages',{
          method:'POST',
          headers:{'Content-Type':'application/json','x-api-key':KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
          body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1500,system:SYS_UP,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:file.type,data:b64}},{type:'text',text:'Analyze this academic document. Identify the subject, solve any problems visible, identify knowledge gaps, and suggest which DoMS IIT Roorkee faculty can help.'}]}]})
        });
        const d=await r.json();
        document.getElementById('up-ld').classList.remove('on');
        document.getElementById('up-content').textContent=d.content?.[0]?.text||'Could not analyze the image.';
        document.getElementById('up-out').style.display='block';
      }catch(e){document.getElementById('up-ld').classList.remove('on');document.getElementById('up-content').textContent='Error: '+e.message;document.getElementById('up-out').style.display='block';}
    };
    reader.readAsDataURL(file);
  }else{
    document.getElementById('up-ld').classList.remove('on');
    document.getElementById('up-content').textContent=`File "${file.name}" received.\n\nPDF analysis: The full version extracts PDF text and sends it to Claude for analysis including:\n• Identifying DoMS IITR subject area\n• Solving visible problems\n• Flagging knowledge gaps linked to faculty\n• Generating targeted practice questions\n\nFor immediate help, describe your question in the AI Assist chat.`;
    document.getElementById('up-out').style.display='block';
  }
}

// ── RENDER CASE CARDS FROM PROFILE ───────────────────────
function renderCaseCards() {
  const skills   = P.skills   || DEF_SKILLS;
  const interests = P.interests || [];
  const goal     = P.goal     || '';
  const spec     = P.specialization || '';

  // Priority 1: weakest skills (need the most work)
  const sortedSkills = Object.entries(skills).sort((a,b) => a[1]-b[1]);
  const topGaps = sortedSkills.filter(([,v]) => v < 70).slice(0, 2).map(([n]) => n);

  // Priority 2: interests the student selected
  const interestMatches = interests.filter(i => CASE_MAP[i]);

  // Priority 3: goal-based matching
  const goalMatches = [];
  if (/CPO|product/i.test(goal))       goalMatches.push('Digital Transformation','Data Science','Strategy');
  if (/CFO|finance|banking/i.test(goal)) goalMatches.push('Finance','FinTech');
  if (/CMO|marketing/i.test(goal))     goalMatches.push('Marketing','Analytics');
  if (/entrepreneur|startup/i.test(goal)) goalMatches.push('Entrepreneurship','Finance');
  if (/operations|SCM|supply/i.test(goal)) goalMatches.push('Supply Chain','Operations Research');
  if (/HR|people|talent/i.test(goal))  goalMatches.push('HR & Leadership');

  // Build ordered list: gaps first, then interests, then goal, no duplicates
  const seen = new Set();
  const picks = [];
  [...topGaps, ...interestMatches, ...goalMatches].forEach(k => {
    if (CASE_MAP[k] && !seen.has(k)) { seen.add(k); picks.push(k); }
  });

  // If fewer than 3 found, fill with skill-based picks
  Object.keys(CASE_MAP).forEach(k => {
    if (picks.length < 3 && !seen.has(k)) { seen.add(k); picks.push(k); }
  });

  const top3 = picks.slice(0, 3);

  // Determine badge type for each card
  function reasonBadge(k) {
    if (topGaps.includes(k)) {
      const v = skills[k] || 50;
      return `<span class="b b-red">Gap: ${v}%</span>`;
    }
    if (interests.includes(k)) return `<span class="b b-gold">Your Interest</span>`;
    return `<span class="b b-blue">Goal-Matched</span>`;
  }

  function cardHTML(k) {
    const c = CASE_MAP[k];
    const reason = reasonBadge(k);
    // Store key as data attribute — event delegation handles click, no inline JS
    const safeKey = encodeURIComponent(k);
    return `<div class="cc case-card-trigger" data-case-key="${safeKey}" style="cursor:pointer">
      <div class="cc-hdr" style="background:${c.bg};pointer-events:none">${c.title}</div>
      <div class="cc-body" style="pointer-events:none">
        <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px">
          <span class="b ${c.badge}">${c.label}</span>${reason}
        </div>
        <div style="font-size:12px;color:var(--ink2);line-height:1.5;margin-bottom:8px">${c.desc}</div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:11px;color:var(--ink3)">⏱ ${c.time}</span>
          <span class="btn btn-sm btn-o" style="padding:3px 9px;font-size:11px">Generate →</span>
        </div>
      </div>
    </div>`;
  }

  // Render into both dashboard and cases screen containers
  const dashGrid  = document.getElementById('dashboard-cases');
  const casesGrid = document.getElementById('cases-grid');
  const html = top3.map(cardHTML).join('');

  if (dashGrid)  dashGrid.innerHTML  = html;
  if (casesGrid) casesGrid.innerHTML = html;
}

// ── CASE CARD CLICK — EVENT DELEGATION ───────────────────
// One listener on document catches all card clicks across all screens.
// No inline onclick. No fragile index references. No detached node issues.
document.addEventListener('click', function(e) {
  const card = e.target.closest('.case-card-trigger');
  if (!card) return;
  e.preventDefault();
  const key = decodeURIComponent(card.dataset.caseKey || '');
  if (key) loadCase(key);
});

function loadCase(key) {
  const c = CASE_MAP[key];
  if (!c) return;

  // Navigate to cases screen
  show('home');

  // Use 120ms timeout — enough for screen transition + DOM paint
  setTimeout(function() {
    const subSel = document.getElementById('case-sub');
    const indSel = document.getElementById('case-ind');

    if (!subSel) {
      // Elements still not ready, try once more
      setTimeout(genCase, 200);
      return;
    }

    // Subject: exact match → first-word startsWith → first-word contains
    const subWord = (c.sub || '').split(' ')[0].toLowerCase();
    const subOpts = Array.from(subSel.options);
    const subMatch = subOpts.find(o => o.value === c.sub)
                  || subOpts.find(o => o.value.toLowerCase().startsWith(subWord))
                  || subOpts.find(o => o.value.toLowerCase().includes(subWord));
    if (subMatch) subSel.value = subMatch.value;

    // Industry: match option text against c.ind keyword
    if (indSel && c.ind) {
      const indWord = c.ind.toLowerCase();
      const indOpts = Array.from(indSel.options);
      const indMatch = indOpts.find(o => o.text.toLowerCase().includes(indWord));
      if (indMatch) indSel.value = indMatch.value;
    }

    genCase();
  }, 120);
}

// ── 1. DYNAMIC EXAM COUNTDOWN ─────────────────────────────
function calcDaysToExam() {
  const today = new Date(); today.setHours(0,0,0,0);
  const examKeys = Object.entries(EVENTS)
    .filter(([,v]) => v[0] === 'ex')
    .map(([k]) => {
      const [y,m,d] = k.split('-').map(Number);
      return new Date(y, m, d);
    })
    .filter(d => d >= today)
    .sort((a,b) => a-b);
  if (!examKeys.length) return null;
  return Math.round((examKeys[0] - today) / 86400000);
}
function updateExamCountdown() {
  const el = document.getElementById('stat-exam');
  if (!el) return;
  const days = calcDaysToExam();
  if (days === null) { el.textContent = '✓'; el.style.color = 'var(--green)'; return; }
  el.textContent = days;
  el.style.color = days <= 7 ? 'var(--red)' : days <= 14 ? 'var(--gold)' : 'var(--blue)';
}

// ── 2. POMODORO TIMER ─────────────────────────────────────
let pomInterval = null, pomSecs = 25*60, pomTotal = 25*60, pomRunning = false;
const POM_DATA_KEY = 'avinya_pom';

function pomLoad() {
  const d = JSON.parse(localStorage.getItem(POM_DATA_KEY) || '{"sessions":[],"streak":0,"lastDate":""}');
  const today = new Date().toDateString();
  if (d.lastDate !== today) {
    // New day — check streak
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
    if (d.lastDate !== yesterday.toDateString()) d.streak = 0;
  }
  return d;
}
function pomSave(d) { localStorage.setItem(POM_DATA_KEY, JSON.stringify(d)); }

function pomSetMode(mins) {
  pomSecs = pomTotal = parseInt(mins) * 60;
  pomRunning = false;
  clearInterval(pomInterval);
  const btn = document.getElementById('pom-btn');
  if (btn) btn.textContent = '▶ Start';
  pomUpdate();
}

function pomToggle() {
  if (pomRunning) {
    clearInterval(pomInterval); pomRunning = false;
    document.getElementById('pom-btn').textContent = '▶ Start';
  } else {
    pomRunning = true;
    document.getElementById('pom-btn').textContent = '⏸ Pause';
    pomInterval = setInterval(() => {
      pomSecs--;
      pomUpdate();
      if (pomSecs <= 0) {
        clearInterval(pomInterval); pomRunning = false;
        pomComplete();
      }
    }, 1000);
  }
}

function pomComplete() {
  const d = pomLoad();
  const today = new Date().toDateString();
  const mins = Math.round(pomTotal / 60);
  d.sessions.unshift({ date: today, mins, subject: document.querySelector('#pom-mode option:checked')?.text || 'Study' });
  if (d.sessions.length > 20) d.sessions.pop();
  if (d.lastDate !== today) { d.streak++; d.lastDate = today; }
  pomSave(d);
  pomUpdateStats();
  if (Notification.permission === 'granted') {
    new Notification('Avinya ✅', { body: `Session complete! ${mins} minutes focused.`, icon: '' });
  }
  pomReset();
}

function pomReset() {
  clearInterval(pomInterval); pomRunning = false;
  const mins = parseInt(document.getElementById('pom-mode')?.value || 25);
  pomSecs = pomTotal = mins * 60;
  const btn = document.getElementById('pom-btn');
  if (btn) btn.textContent = '▶ Start';
  pomUpdate();
}

function pomUpdate() {
  const m = Math.floor(pomSecs/60), s = pomSecs%60;
  const disp = document.getElementById('pom-display');
  if (disp) disp.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const ring = document.getElementById('pom-ring');
  if (ring) {
    const circ = 364.4;
    ring.style.strokeDashoffset = circ * (1 - pomSecs/pomTotal);
    ring.style.stroke = pomSecs < 60 ? 'var(--red)' : 'var(--blue)';
  }
}

function pomUpdateStats() {
  const d = pomLoad();
  const today = new Date().toDateString();
  const todaySessions = d.sessions.filter(s => s.date === today);
  const totalMins = todaySessions.reduce((a,s) => a+s.mins, 0);
  const el = document.getElementById('pom-sessions');
  const cnt = document.getElementById('pom-count');
  const mins = document.getElementById('pom-mins');
  const streak = document.getElementById('pom-streak');
  if (cnt) cnt.textContent = todaySessions.length;
  if (mins) mins.textContent = totalMins;
  if (streak) streak.textContent = d.streak;
  if (el) {
    if (!todaySessions.length) { el.textContent = 'No sessions yet — start your first focus block!'; return; }
    el.innerHTML = todaySessions.slice(0,5).map(s =>
      `<span class="session-chip">✓ ${s.mins}min ${s.subject}</span>`
    ).join('');
  }
}

// ── MCQ score history ─────────────────────────────────────
const MCQ_HIST_KEY = 'avinya_mcq_history';

function saveMCQResult(sub, correct, total, wrongs) {

function renderMCQStreak() {

// ── GENERATE MCQ (KB-grounded) ────────────────────────────
async function genMCQ() {
  const sub   = document.getElementById('mcq-sub')?.value || 'Operations Research';
  const count = parseInt(document.getElementById('mcq-count')?.value || 5);
  const diff  = document.getElementById('mcq-difficulty')?.value || 'medium';
  const ld    = document.getElementById('mcq-ld');
  const ldTxt = document.getElementById('mcq-ld-txt');
  const area  = document.getElementById('mcq-area');
  const result= document.getElementById('mcq-result');
  if (ld)     ld.classList.add('on');
  if (area)   area.innerHTML = '';
  if (result) result.style.display = 'none';
  mcqAnswered = 0; mcqCorrect = 0; mcqWrongTopics = [];

  // Pull course context from COURSE_KB
  const courseCtx = typeof getCourseContext === 'function' ? getCourseContext(sub) : '';
  const profile   = typeof getProfileContext === 'function' ? getProfileContext() : '';

  const diffMap = {
    easy:   'simple recall/definition questions — what is X, define Y, list the steps of Z',
    medium: 'application questions — given a scenario, apply the framework; short calculations; compare two concepts',
    hard:   'complex numerical problems or multi-step analysis — include realistic Indian business scenarios with specific numbers',
    exam:   'mixed exam-style — 30% recall, 40% application, 30% numerical/analytical — exactly like IITR eMBA end-term paper style'
  };

  if (ldTxt) ldTxt.textContent = `Generating ${diff} questions on ${sub.split('(')[0].trim()}...`;

  const prompt = `You are an exam paper setter for IIT Roorkee DoMS eMBA.

COURSE: ${sub}
STUDENT PROFILE: ${profile.slice(0, 300)}

COURSE KNOWLEDGE BASE:
${courseCtx.slice(0, 1500)}

Generate exactly ${count} multiple-choice questions.
DIFFICULTY: ${diffMap[diff]}

RULES:
- Questions must be grounded in the actual topics and frameworks listed above
- For numerical questions, include real numbers and show what to compute
- Include Indian business context where relevant (Tata, Reliance, HDFC, Infosys etc.)
- Each explanation must cite the specific framework or concept from the course notes
- Vary question types: definition, application, calculation, scenario analysis

Return ONLY a valid JSON array — no markdown, no preamble:
[{"q":"Full question text","opts":["A) ...","B) ...","C) ...","D) ..."],"ans":0,"explain":"Why correct + which course concept applies","topic":"Specific sub-topic"}]

ans is the 0-based index of the correct option.`;

  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json','x-api-key':KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({ model:'claude-sonnet-4-6', max_tokens: 2500, messages:[{role:'user',content:prompt}] })
    });
    const d = await r.json();
    const txt = d.content?.[0]?.text || '[]';
    const clean = txt.replace(/```json|```/g,'').trim();
    mcqQuestions = JSON.parse(clean.substring(clean.indexOf('['), clean.lastIndexOf(']')+1));
    renderMCQ();
  } catch(e) {
    if (area) area.innerHTML = `<div style="color:var(--red);font-size:13px;padding:10px">Failed to generate. Check your API key.<br><small>${e.message}</small></div>`;
  }
  if (ld) ld.classList.remove('on');
}

// Generate MCQ from wrong answer topics (adaptive retry)
async function genMCQFromHistory() {
  const hist = JSON.parse(localStorage.getItem(MCQ_HIST_KEY) || '[]');
  const wrongEntries = hist.filter(h => h.pct < 70 && h.wrongs && h.wrongs.length);
  if (!wrongEntries.length) { genMCQ(); return; }

  // Find most common weak topic
  const allWrongs = wrongEntries.flatMap(h => h.wrongs);
  const freq = {};
  allWrongs.forEach(w => freq[w] = (freq[w]||0)+1);
  const weakest = Object.entries(freq).sort((a,b)=>b[1]-a[1])[0]?.[0] || '';

  const subEl = document.getElementById('mcq-sub');
  // Try to match weakest topic to a subject option
  if (subEl && weakest) {
    const opts = Array.from(subEl.options);
    const match = opts.find(o => o.value.toLowerCase().includes(weakest.toLowerCase().split(' ')[0]));
    if (match) subEl.value = match.value;
  }

  // Set difficulty to medium-hard for retry
  const diffEl = document.getElementById('mcq-difficulty');
  if (diffEl) diffEl.value = 'hard';

  genMCQ();
}

function renderMCQ() {
  const area = document.getElementById('mcq-area');
  if (!area) return;
  area.innerHTML = mcqQuestions.map((q, qi) => `
    <div class="mcq-card" id="mcq-${qi}">
      <div class="mcq-q">Q${qi+1}. ${q.q}</div>
      ${q.opts.map((opt, oi) =>
        `<button class="mcq-opt" onclick="mcqAnswer(${qi},${oi})">${opt}</button>`
      ).join('')}
      <div class="mcq-explain" id="mcq-exp-${qi}">${q.explain || ''}</div>
    </div>`).join('');
}

function mcqAnswer(qi, oi) {
  const q    = mcqQuestions[qi];
  const card = document.getElementById('mcq-'+qi);
  if (!card || card.dataset.answered) return;
  card.dataset.answered = '1';
  mcqAnswered++;
  const btns = card.querySelectorAll('.mcq-opt');
  btns.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.ans) btn.classList.add('correct');
    else if (i === oi) btn.classList.add('wrong');
    else btn.classList.add('reveal');
  });
  const exp = document.getElementById('mcq-exp-'+qi);
  if (exp) exp.style.display = 'block';
  if (oi === q.ans) {
    mcqCorrect++;
  } else {
    // Track wrong topic for adaptive retry
    if (q.topic) mcqWrongTopics.push(q.topic);
  }
  if (mcqAnswered === mcqQuestions.length) setTimeout(showMCQResult, 500);
}

function showMCQResult() {
  const result   = document.getElementById('mcq-result');
  const scoreVal = document.getElementById('mcq-score-val');
  const scoreMsg = document.getElementById('mcq-score-msg');
  const weakDiv  = document.getElementById('mcq-weak-topics');
  if (!result) return;

  const sub = document.getElementById('mcq-sub')?.value || '';
  result.style.display = 'block';
  const pct = mcqCorrect / mcqQuestions.length;
  if (scoreVal) scoreVal.textContent = `${mcqCorrect}/${mcqQuestions.length}`;

  const msg = pct >= 0.8 ? '🎉 Excellent! You\'re exam-ready on this topic.' :
              pct >= 0.6 ? '📚 Good effort. Review the explanations above, then retry.' :
              pct >= 0.4 ? '⚠️ Needs work. Focus on the weak areas listed below.' :
                           '🔴 Difficult topic. Try Easy difficulty first to build confidence.';
  if (scoreMsg) scoreMsg.textContent = msg;

  if (weakDiv) {
    if (mcqWrongTopics.length) {
      weakDiv.innerHTML = `<div style="background:#fff3e0;border-radius:var(--r);padding:8px 12px;border-left:3px solid var(--orange)">
        <div style="font-size:11px;font-weight:700;color:var(--orange);margin-bottom:4px">⚠️ Weak areas to review:</div>
        <div style="font-size:12px;color:var(--ink2)">${[...new Set(mcqWrongTopics)].join(' · ')}</div>
      </div>`;
    } else {
      weakDiv.innerHTML = '';
    }
  }

  // Save to history
  saveMCQResult(sub, mcqCorrect, mcqQuestions.length, [...new Set(mcqWrongTopics)]);
  result.scrollIntoView({behavior:'smooth', block:'start'});
}

function buildStaticBriefing() { if(typeof buildSessionAwareBriefing==='function') buildSessionAwareBriefing(); }


async function genDailyBriefing() {
  const briefEl = document.getElementById('brief-items');
  if (!briefEl) return;
  const days = calcDaysToExam();
  const profile = typeof getProfileContext === 'function' ? getProfileContext() : '';
  const skills = (typeof P !== 'undefined' && P.skills) ? P.skills : {};
  const weakest = Object.entries(skills).sort((a,b)=>a[1]-b[1]).slice(0,2).map(([n,v])=>`${n}(${v}%)`).join(', ');

  const prompt = `You are Avinya, a personal eMBA coach for an IIT Roorkee eMBA student.

Student profile: ${profile}
Days to next exam: ${days ?? 'exams complete'}
Weakest subjects: ${weakest}
Active placements: ${placements.filter(p=>!['offer','rejected'].includes(p.status)).length}

Write a warm, motivating daily briefing in exactly 4 bullet points (use • bullet):
1. Exam readiness advice for today
2. Specific subject to study today with one actionable tip
3. Placement/career advice for this week  
4. One motivational insight tailored to their goal: ${typeof P !== 'undefined' ? P.goal || 'eMBA success' : 'eMBA success'}

Keep each bullet to 1-2 sentences. Be specific, not generic.`;

  const oldHtml = briefEl.innerHTML;
  briefEl.innerHTML = '<div class="brief-item"><span class="brief-icon">⏳</span><span class="brief-text">Getting your personalised briefing...</span></div>';

  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({model:'claude-sonnet-4-6',max_tokens:400,messages:[{role:'user',content:prompt}]})
    });
    const d = await r.json();
    const txt = d.content?.[0]?.text || '';
    const icons = ['⏱','📚','💼','✨'];
    const lines = txt.split('\n').filter(l=>l.trim().startsWith('•')).slice(0,4);
    briefEl.innerHTML = lines.map((l,i)=>`<div class="brief-item"><span class="brief-icon">${icons[i]||'💡'}</span><span class="brief-text">${l.replace('•','').trim()}</span></div>`).join('') || oldHtml;
  } catch(e) {
    briefEl.innerHTML = oldHtml;
  }
}

// ── 8. JOURNEY MILESTONES ─────────────────────────────────
function renderMilestones() {
  const list = document.getElementById('milestones-list');
  if (!list) return;
  const term    = (typeof P !== 'undefined' ? parseInt(P.term?.replace('Term ','')) : 0) || 0;

  // Pick a likely Major Project supervisor from FACULTY based on student's specialization
  // Falls back to a pool message if profile isn't set
  function getMajorProjectDesc() {
    const spec = (typeof P !== 'undefined' && P.specialization) ? P.specialization.toLowerCase() : '';
    const goal = (typeof P !== 'undefined' && P.goal) ? P.goal.toLowerCase() : '';

    // Map specialization → typical faculty supervisors from FACULTY array
    const specMap = {
      operations: ['Rajat Agrawal','A. Ramesh','R. Anbanandam','Amit Upadhyay'],
      finance:    ['Ashu Khanna','J.P. Singh','Anil Kumar Sharma','A.K. Kulbhaskar'],
      marketing:  ['J.K. Nayak','Vinay Sharma','Kalpak Kulkarni','Jogendra Kumar Nayak'],
      is:         ['Gaurav Dixit','Sumit Kumar Yadav','Eshan Bhatt'],
      hr:         ['R.L. Dhar','Usha Lenka','S.N. Rangnekar','Rajib Lochan Dhar'],
    };

    // Match spec string to key
    const key = spec.includes('oper') ? 'operations'
              : spec.includes('fin')  ? 'finance'
              : spec.includes('mark') ? 'marketing'
              : spec.includes('info') || spec.includes(' is') || spec.includes('system') ? 'is'
              : spec.includes('hr') || spec.includes('human') ? 'hr'
              // Try goal as fallback
              : goal.includes('cfo') || goal.includes('financ') ? 'finance'
              : goal.includes('cmo') || goal.includes('market') ? 'marketing'
              : goal.includes('cto') || goal.includes('tech') || goal.includes('data') ? 'is'
              : goal.includes('hr') || goal.includes('people') ? 'hr'
              : goal.includes('oper') || goal.includes('supply') || goal.includes('chain') ? 'operations'
              : null;

    if (key && specMap[key]) {
      const pool = specMap[key];
      // Pick based on name hash for determinism
      const name = (typeof P !== 'undefined' && P.name) ? P.name : '';
      const idx = name.length % pool.length;
      return `BMC-601E · Likely supervisor: Prof. ${pool[idx]} (DoMS) · Based on your ${key} track`;
    }

    // No specialization set — show the full pool
    const allFac = typeof FACULTY !== 'undefined'
      ? FACULTY.filter(f => !f.tag || f.tag === 'practice')
               .filter(f => f.area && f.area !== 'admin')
               .map(f => f.name.split(' ').slice(-1)[0]) // last names
               .slice(0, 6)
               .join(', ')
      : 'any DoMS faculty';
    return `BMC-601E · Supervisor assigned from DoMS faculty pool · Set your specialization in My Profile for a personalised suggestion`;
  }

  const ms = [
    {icon:'🎓', title:'Enrolled in IIT Roorkee eMBA',          desc:'Journey begins at DoMS IITR',                                    done:true,    date:'2024'},
    {icon:'📚', title:'Term 1 & 2 Complete',                    desc:'Core foundations: Finance, Strategy, OB, Marketing',             done:term>=2,  date:'Term 2'},
    {icon:'🔬', title:'Term 3 & 4 Complete',                    desc:'Specialization electives + Data Science',                        done:term>=4,  date:'Term 4'},
    {icon:'💡', title:'Term 4 Exams',                           desc:'SM2, HRM, PMS, SDG, PM, Infra, TAM, IB, DSM, EAI · May 2026',   done:false,    date:'May 2026'},
    {icon:'📖', title:'Term 5–7 Electives',                     desc:'Deepen your specialization track · 15+ electives minimum',       done:false,    date:'Terms 5–7'},
    {icon:'🚀', title:'Major Project (BMC-601E)',                desc:getMajorProjectDesc(),                                            done:false,    date:'Term 8'},
    {icon:'🌐', title:'Campus Immersion',                       desc:'3–4 days on campus at IIT Roorkee, Roorkee',                     done:false,    date:'Sep–Dec 2026'},
    {icon:'🏆', title:'eMBA Graduation',                        desc:'73+ credits · DoMS IIT Roorkee · NIRF #6',                       done:false,    date:'2026–27'},
    {icon:'💼', title:(typeof P !== 'undefined' && P.goal) ? P.goal : 'Career Goal Achieved',
                                                                 desc:'The reason you started this journey',                            done:false,    date:'Post-MBA'},
  ];

  list.innerHTML = ms.map((m, i) => {
    const cls = m.done ? 'ms-done' : (i === ms.findIndex(x=>!x.done) ? 'ms-now' : 'ms-future');
    return `<div class="milestone">
      <div class="ms-dot ${cls}">${m.done ? '✓' : m.icon}</div>
      <div class="ms-info">
        <div class="ms-title">${m.title}</div>
        <div class="ms-desc">${m.desc}</div>
      </div>
      <div class="ms-date">${m.date}</div>
    </div>`;
  }).join('');
}

// ── 9. GOALS + WELLBEING ──────────────────────────────────
const GOALS_KEY = 'avinya_goals';
const WB_KEY    = 'avinya_wellbeing';

function loadGoals() { return JSON.parse(localStorage.getItem(GOALS_KEY)||'[]'); }
function saveGoals(g) { localStorage.setItem(GOALS_KEY, JSON.stringify(g)); }

function addGoal() {
  const inp = document.getElementById('goal-inp');
  const text = inp?.value.trim();
  if (!text) return;
  const goals = loadGoals();
  goals.unshift({id:Date.now(), text, done:false, date: new Date().toLocaleDateString()});
  saveGoals(goals);
  inp.value = '';
  renderGoals();
}

function toggleGoal(id) {
  const goals = loadGoals().map(g => g.id===id ? {...g,done:!g.done} : g);
  saveGoals(goals);
  renderGoals();
}

function renderGoals() {
  const el = document.getElementById('goals-list');
  if (!el) return;
  const goals = loadGoals();
  if (!goals.length) { el.innerHTML = '<div style="font-size:12px;color:var(--ink3);padding:6px 0">No goals yet. Add your first weekly goal below.</div>'; return; }
  el.innerHTML = goals.slice(0,8).map(g=>`
    <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">
      <input type="checkbox" ${g.done?'checked':''} onchange="toggleGoal(${g.id})" style="cursor:pointer;flex-shrink:0">
      <span style="font-size:13px;color:var(--ink2);flex:1;${g.done?'text-decoration:line-through;color:var(--ink3)':''}">${g.text}</span>
      <span style="font-size:10px;color:var(--ink3)">${g.date}</span>
    </div>`).join('');
}

function logWellbeing(score) {
  const log = JSON.parse(localStorage.getItem(WB_KEY)||'[]');
  log.unshift({score, date: new Date().toLocaleDateString(), time: new Date().toLocaleTimeString()});
  if (log.length > 30) log.pop();
  localStorage.setItem(WB_KEY, JSON.stringify(log));
  // Highlight selected
  for(let i=1;i<=5;i++) {
    const btn = document.getElementById('wb-'+i);
    if (btn) btn.style.background = i===score ? 'var(--blue)' : 'var(--bg3)';
  }
  const labels = {1:'Overwhelmed — exam stress is real. Take a 10-min break.',2:'Tired — that\'s normal. Small steps today.',3:'Okay — steady progress. You\'ve got this.',4:'Good — great momentum! Keep it up.',5:'Energised! ⚡ Channel this into your weakest subject.'};
  const hist = document.getElementById('wb-history');
  if (hist) {
    const emoji = ['😰','😐','🙂','😊','🤩'][score-1];
    hist.innerHTML = `<div style="margin-top:8px;padding:8px;background:var(--bg3);border-radius:var(--r);font-size:12px;color:var(--ink2)">${emoji} ${labels[score]}</div>
    <div style="margin-top:6px;font-size:11px;color:var(--ink3)">${log.slice(0,7).map(e=>`${e.date}: ${['😰','😐','🙂','😊','🤩'][e.score-1]}`).join(' · ')}</div>`;
  }
}

// ── 10. SESSION MEMORY ────────────────────────────────────
const MEM_KEY = 'avinya_history';

function saveToHistory(question, answer) {
  const hist = JSON.parse(localStorage.getItem(MEM_KEY)||'[]');
  hist.unshift({q:question.slice(0,80), a:answer.slice(0,200), date: new Date().toLocaleDateString(), time: new Date().toLocaleTimeString()});
  if (hist.length > 20) hist.pop();
  localStorage.setItem(MEM_KEY, JSON.stringify(hist));
  renderHistory();
}

function renderHistory() {
  const el = document.getElementById('history-list');
  if (!el) return;
  const hist = JSON.parse(localStorage.getItem(MEM_KEY)||'[]');
  if (!hist.length) { el.textContent = 'No saved conversations yet. AI responses are automatically saved here.'; return; }
  el.innerHTML = hist.slice(0,10).map(h=>`
    <div style="padding:10px;border:1px solid var(--border);border-radius:var(--r);margin-bottom:7px;background:var(--bg2);cursor:pointer" onclick="reaskQuestion('${h.q.replace(/'/g,"\\'")}')">
      <div style="font-size:12px;font-weight:600;color:var(--ink2);margin-bottom:3px">${h.q}${h.q.length>=80?'...':''}</div>
      <div style="font-size:11px;color:var(--ink3);line-height:1.4">${h.a}${h.a.length>=200?'...':''}</div>
      <div style="font-size:10px;color:var(--ink3);margin-top:4px">${h.date} ${h.time}</div>
    </div>`).join('');
}

function reaskQuestion(q) {
  ishow('chat-tab','chat-sc'); show('assist-new');
  document.getElementById('main-inp').value = q;
}

function clearHistory() {
  if (confirm('Clear all saved conversations?')) { localStorage.removeItem(MEM_KEY); renderHistory(); }
}

// Session memory is saved inside chat() directly above — no patch needed

// ── 11. RESPONSE RATING ───────────────────────────────────
function addRating(msgDiv, q) {
  const row = document.createElement('div');
  row.className = 'rate-row';
  row.innerHTML = `
    <span style="font-size:11px;color:var(--ink3);margin-right:4px">Was this helpful?</span>
    <button class="rate-btn" onclick="rateResponse(this,'up','${q.slice(0,30).replace(/'/g,'')}')">👍 Yes</button>
    <button class="rate-btn" onclick="rateResponse(this,'down','${q.slice(0,30).replace(/'/g,'')}')">👎 No</button>`;
  msgDiv.appendChild(row);
}

function rateResponse(btn, type, q) {
  const ratings = JSON.parse(localStorage.getItem('avinya_ratings')||'[]');
  ratings.push({type, q, date: new Date().toISOString()});
  localStorage.setItem('avinya_ratings', JSON.stringify(ratings));
  btn.closest('.rate-row').innerHTML = `<span style="font-size:11px;color:var(--green)">✓ Thanks for the feedback!</span>`;
}

// ── 12. DARK MODE ─────────────────────────────────────────
function toggleDark() {
  const on = document.body.classList.toggle('dark');
  localStorage.setItem('avinya_dark', on ? '1' : '0');
  const btn = document.getElementById('dark-toggle');
  if (btn) btn.textContent = on ? 'Disable' : 'Enable';
}

let pwaPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); pwaPrompt = e;
  const btn = document.getElementById('pwa-btn');
  const st  = document.getElementById('pwa-status');
  if (btn) btn.style.display = 'inline-flex';
  if (st)  st.style.display  = 'none';
});

// installPWA → defined in wow features below

function requestNotif() {
  if (!('Notification' in window)) { alert('Notifications not supported in this browser.'); return; }
  Notification.requestPermission().then(p => {
    if (p === 'granted') {
      new Notification('Avinya 🎓', { body: 'Exam reminders enabled! You will be notified before exams.' });
      scheduleExamReminders();
    }
  });
}

function scheduleExamReminders() {
  const days = calcDaysToExam();
  if (days && days <= 7 && Notification.permission === 'granted') {
    // Check daily
    setTimeout(() => {
      new Notification('Avinya ⏰', { body: `${days} days to your next exam. Check the Calendar tab for details.` });
    }, 3000);
  }
}

// ── SELECT SPECIALIZATION ─────────────────────────────────
function selectSpec(spec, el) {
  currentSpec = spec;
  document.querySelectorAll('.spec-tab').forEach(t => t.classList.remove('on'));
  if (el) el.classList.add('on');
  renderCourses(spec);

// ── RENDER COURSE CARDS ───────────────────────────────────
function renderCourses(spec) {
  const el = document.getElementById('courses-list');
  if (!el) return;
  const d = SPEC_DATA[spec];
  if (!d) return;

  // Highlight courses matching user's gaps
  const gaps = typeof P !== 'undefined' ? Object.entries(P.skills||{}).filter(([,v])=>v<65).map(([n])=>n.toLowerCase()) : [];

  el.innerHTML = d.courses.map(c => {
    const isGap = gaps.some(g => c.name.toLowerCase().includes(g.split(' ')[0]));
    const gapBadge = isGap ? '<span class="course-tag" style="background:#ffe5e5;color:#8b0000;font-size:9px">⚠ Gap Area</span>' : '';
    return `<div class="course-card ${c.type}">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:6px">
        <div style="flex:1">
          <div style="font-size:12px;font-weight:600;color:var(--ink);margin-bottom:3px">${c.name} ${gapBadge}</div>
          <div style="font-size:11px;color:var(--ink3)">${c.prof} · ${c.credits} credits · ${c.term}</div>
        </div>
        <span class="course-tag ${c.type==='core'?'ct-core':'ct-elec'}">${c.type==='core'?'Core':'Elective'}</span>
      </div>
      <div style="font-size:10px;color:var(--ink3);margin-top:4px">Code: ${c.code}</div>
    </div>`;
  }).join('');
}

// ── RENDER SALARY CHART (SVG bar chart) ───────────────────
function renderSalaryChart(spec) {
  const el = document.getElementById('salary-chart');
  if (!el) return;
  const d = SPEC_DATA[spec];
  const maxVal = Math.max(...d.salary.map(r => r.val));

  el.innerHTML = d.salary.map(r => {
    const pct = Math.round(r.val / maxVal * 100);
    return `<div class="bar-chart-row">
      <div class="bar-chart-label">${r.role}</div>
      <div class="bar-chart-track">
        <div class="bar-chart-fill" style="width:${pct}%;background:${r.color}">
          <span class="bar-chart-val">₹${r.val}L</span>
        </div>
      </div>
    </div>`;
  }).join('');

  // Add stat chips below
  el.insertAdjacentHTML('beforeend', `
    <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
      <span class="b b-green" style="font-size:10px">Avg: ${d.avgSalary}</span>
      <span class="b b-blue" style="font-size:10px">Growth: ${d.growth}</span>
      <span class="b b-gold" style="font-size:10px">${d.openings} openings</span>
    </div>`);
}

// ── RENDER DEMAND CHART ───────────────────────────────────
function renderDemandChart(spec) {
  const el = document.getElementById('demand-chart');
  if (!el) return;
  const d = SPEC_DATA[spec];

  el.innerHTML = d.demand.map(r => {
    const col = r.pct >= 85 ? 'var(--green)' : r.pct >= 70 ? 'var(--blue)' : 'var(--gold)';
    return `<div class="bar-chart-row">
      <div class="bar-chart-label">${r.skill}</div>
      <div class="bar-chart-track">
        <div class="bar-chart-fill" style="width:${r.pct}%;background:${col}">
          <span class="bar-chart-val">${r.pct}%</span>
        </div>
      </div>
    </div>`;
  }).join('');

  el.insertAdjacentHTML('beforeend', `<div style="font-size:10px;color:var(--ink3);margin-top:6px">Demand index based on LinkedIn India job postings analysis</div>`);
}

  if (ld) ld.classList.add('on');

Provide exactly 5 specific job roles currently in demand in India. For each role return:

// Seeds coursera-chat with context from a search/transcript (hidden messages)
// so follow-up questions in courseraChat have full context
function seedCourseraChat(userMsg, aiMsg) {
  const el = document.getElementById('coursera-chat');
  if (!el) return;
  // Add hidden context messages that getChatHistory() will pick up
  const u = document.createElement('div');
  u.className = 'msg msg-u'; u.textContent = userMsg;
  u.style.cssText = 'font-size:11px;opacity:0.6;font-style:italic';
  const a = document.createElement('div');
  a.className = 'msg msg-a'; a.textContent = aiMsg.slice(0, 800) + (aiMsg.length > 800 ? '…' : '');
  a.style.cssText = 'font-size:11px;opacity:0.6';
  el.appendChild(u);
  el.appendChild(a);
  el.scrollTop = el.scrollHeight;
  // Show a nudge
  const nudge = document.createElement('div');
  nudge.style.cssText = 'font-size:11px;color:var(--ink3);text-align:center;padding:4px;border-top:1px solid var(--border)';
  nudge.textContent = '↑ Context loaded — ask follow-up questions below';
  el.appendChild(nudge);
  el.scrollTop = el.scrollHeight;
}
async function courseraChat() {
  const inp = document.getElementById('coursera-inp');
  const q = inp.value.trim(); if(!q) return;

  addMsg('coursera-chat', q, 'u');
  inp.value = '';

  const ld = document.getElementById('coursera-chat-ld');
  if(ld) ld.classList.add('on');
  agentSet('web','busy');

  // Build full conversation history for context continuity
  const history = getChatHistory('coursera-chat');

  const sys = `You are a Coursera learning advisor for IIT Roorkee eMBA students. 
You help find the best courses, instructors, and learning paths on Coursera aligned with the DoMS IITR curriculum.
Search for current information about courses, instructor credentials, ratings, and course content.
Student profile: ${typeof getProfileContext === 'function' ? getProfileContext() : 'IIT Roorkee eMBA student'}
Remember and build on the full conversation context above.`;

  const reply = await callClaude(history, sys, true);

  if(ld) ld.classList.remove('on');
  agentSet('web','done');
  setTimeout(()=>agentSet('web','idle'), 2000);

  addMsgWithTrace('coursera-chat', reply, ['orch','web'], 0);
}

function clearCourseraChat() {
  const el = document.getElementById('coursera-chat');
  if(el) el.innerHTML = '<div class="msg msg-a">Conversation cleared. Ask a new question about Coursera courses or instructors.</div>';
}

// Look up courses by term, professor name, or topic keyword
function findCourses(query) {
  if (!query) return COURSE_KB;
  const q = query.toLowerCase();
  return COURSE_KB.filter(c =>
    c.name.toLowerCase().includes(q) ||
    c.professor.toLowerCase().includes(q) ||
    c.term.toLowerCase().includes(q) ||
    c.code.toLowerCase().includes(q) ||
    c.topics.some(t => t.toLowerCase().includes(q)) ||
    c.frameworks.some(f => f.toLowerCase().includes(q)) ||
    (c.notes && c.notes.toLowerCase().includes(q))
  );
}

// Get enriched system prompt context for a specific course query
function getCourseContext(query) {
  const matches = findCourses(query);
  if (!matches.length) return '';
  return matches.slice(0, 5).map(c =>
    `COURSE: ${c.name} (${c.code}) | ${c.term}\n` +
    `PROFESSOR: ${c.professor} — ${c.profRole}\n` +
    (c.coProfs && c.coProfs.length ? `CO-FACULTY: ${c.coProfs.join(', ')}\n` : '') +
    `TOPICS COVERED: ${c.topics.join('; ')}\n` +
    `KEY FRAMEWORKS: ${c.frameworks.join(', ')}\n` +
    (c.notes ? `TRANSCRIPT/EXAM NOTES: ${c.notes.slice(0, 300)}` : '')
  ).join('\n\n---\n\n');
}
